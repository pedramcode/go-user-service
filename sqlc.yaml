version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/queries"
    schema: "./migrations"
    gen:
      go:
        package: "sql_repository"
        out: "internal/infrastructure/persistent/repository/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
