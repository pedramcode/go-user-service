definitions:
  dto.HealthResponse:
    properties:
      service:
        example: user-service
        type: string
      status:
        example: healthy
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
      uptime:
        example: 24h30m15s
        type: string
      version:
        example: 1.0.0
        type: string
    type: object
  dto.LiveResponse:
    properties:
      status:
        example: alive
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  dto.ReadinessResponse:
    properties:
      database:
        example: connected
        type: string
      status:
        example: ready
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  handler.ErrorInfo:
    properties:
      code:
        type: string
      details:
        type: string
      message:
        type: string
    type: object
  handler.MetaInfo:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  handler.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/handler.ErrorInfo'
      meta:
        $ref: '#/definitions/handler.MetaInfo'
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: User management service with authentication and authorization
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: User Service API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns the health status of the service
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            $ref: '#/definitions/dto.HealthResponse'
      summary: Health check
      tags:
      - system
  /live:
    get:
      description: Checks if the service is alive (Kubernetes compatible)
      produces:
      - application/json
      responses:
        "200":
          description: Service is alive
          schema:
            $ref: '#/definitions/dto.LiveResponse'
      summary: Liveness probe
      tags:
      - system
  /ready:
    get:
      description: Checks if the service is ready to accept traffic (includes database
        check)
      produces:
      - application/json
      responses:
        "200":
          description: Service is ready
          schema:
            $ref: '#/definitions/dto.ReadinessResponse'
        "503":
          description: Service is not ready
          schema:
            $ref: '#/definitions/handler.Response'
      summary: Readiness probe
      tags:
      - system
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
